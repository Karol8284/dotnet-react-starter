version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: dotnet-react-postgres
    environment:
      - POSTGRES_DB=dotnet_react_starter
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - dotnet-react-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d dotnet_react_starter" ]
      interval: 10s
      timeout: 5s
      retries: 10

  # Backend API (.NET)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dotnet-react-backend
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5000
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=dotnet_react_starter;Username=postgres;Password=postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dotnet-react-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend React
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dotnet-react-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - dotnet-react-network

networks:
  dotnet-react-network:
    driver: bridge

volumes:
  postgres_data:
