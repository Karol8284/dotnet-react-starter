services:
  db:
    image: postgres:16-alpine
    container_name: dotnet-react-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dotnetreact}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - dotnet-react-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-dotnetreact}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Backend API (.NET)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dotnet-react-backend
    ports:
      - "${BACKEND_HTTP_PORT:-5000}:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Production}
      - ASPNETCORE_URLS=${ASPNETCORE_URLS:-http://+:5000}
      - DefaultConnection=${DEFAULT_CONNECTION:-Host=db;Port=5432;Database=dotnetreact;Username=postgres;Password=postgres}
      - Jwt__Secret=${JWT_SECRET:-local-development-secret-change-before-production-123456789}
      - Jwt__Issuer=${JWT_ISSUER:-Dotnet-React-Starter-API}
      - Jwt__Audience=${JWT_AUDIENCE:-Dotnet-React-Starter-App}
      - Jwt__AccessTokenExpiresInMinutes=${JWT_ACCESS_TOKEN_EXPIRES_IN_MINUTES:-15}
      - Jwt__RefreshTokenExpiresInDays=${JWT_REFRESH_TOKEN_EXPIRES_IN_DAYS:-7}
      - Jwt__RefreshTokenCookieName=${JWT_REFRESH_TOKEN_COOKIE_NAME:-drs.refreshToken}
      - Jwt__RefreshTokenCookiePath=${JWT_REFRESH_TOKEN_COOKIE_PATH:-/api/auth}
      - Jwt__RefreshTokenCookieSameSite=${JWT_REFRESH_TOKEN_COOKIE_SAME_SITE:-Lax}
      - Jwt__RefreshTokenCookieSecurePolicy=${JWT_REFRESH_TOKEN_COOKIE_SECURE_POLICY:-Always}
      - Jwt__RefreshTokenCookieIsEssential=${JWT_REFRESH_TOKEN_COOKIE_IS_ESSENTIAL:-true}
      - Jwt__RefreshTokenCookieDomain=${JWT_REFRESH_TOKEN_COOKIE_DOMAIN:-}
      - Cors__AllowCredentials=${CORS_ALLOW_CREDENTIALS:-true}
      - Cors__AllowedOrigins__0=${CORS_ALLOWED_ORIGIN_0:-http://localhost:3000}
      - Cors__AllowedOrigins__1=${CORS_ALLOWED_ORIGIN_1:-http://localhost:5173}
      - Cors__AllowedOrigins__2=${CORS_ALLOWED_ORIGIN_2:-https://localhost:5173}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dotnet-react-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend React
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${FRONTEND_REACT_APP_API_URL:-/api}
        NODE_OPTIONS: ${FRONTEND_NODE_OPTIONS:---max_old_space_size=4096}
    container_name: dotnet-react-frontend
    ports:
      - "${FRONTEND_HTTP_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - dotnet-react-network

networks:
  dotnet-react-network:
    driver: bridge

volumes:
  postgres-data:
